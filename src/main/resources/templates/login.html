<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>醫師登入 - MiniClinic</title>

    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            max-width: 420px;
            margin: 80px auto;
            padding: 0 20px;
        }

        h1 {
            color: #0F2443;
            text-align: center;
        }

        .field {
            margin: 16px 0;
        }

        label {
            display: block;
            font-weight: bold;
            color: #0F2443;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .error {
            color: #DC2626;
            font-size: 13px;
            margin-top: 4px;
        }

        .alert {
            background: #FEE2E2;
            color: #991B1B;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            background: #14B8A6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
        }

        button:hover {
            background: #0D9488;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: #0F2443;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>醫師登入</h1>

<div class="alert"
     th:if="${errorMessage}"
     th:text="${errorMessage}">
</div>

<form th:action="@{/login}"
      th:object="${loginForm}"
      method="post">

    <div class="field">
        <label>醫師編號</label>

        <input type="text"
               th:field="*{doctorId}"
               placeholder="D001">

        <div class="error"
             th:if="${#fields.hasErrors('doctorId')}"
             th:errors="*{doctorId}">
        </div>
    </div>

    <div class="field">
        <label>密碼</label>

        <input type="password"
               th:field="*{password}">

        <div class="error"
             th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}">
        </div>
    </div>

    <button type="submit">登入</button>

</form>

<div class="back-home">
    <a th:href="@{/}">← 回首頁</a>
</div>

</body>
</html>
