<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號結果 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        .card { background: #F8FAFC; padding: 24px; border-left: 5px solid #14B8A6; border-radius: 4px; }
        dt { font-weight: bold; color: #0F2443; margin-top: 12px; }
        dd { margin-left: 0; margin-bottom: 8px; }
        .notice { color: #B45309; margin-top: 20px; }
        a { color: #14B8A6; }
    </style>
</head>
<body>
    <h1>掛號摘要</h1>

    <div class="card">
        <dl>
            <dt>掛號編號</dt>
            <dd th:text="${appointment.apptId}">1</dd>

            <dt>病歷號</dt>
            <dd th:text="${appointment.patient.chartNo}">TEST00001</dd>

            <dt>病患姓名</dt>
            <dd th:text="${appointment.patient.name}">測試病患甲</dd>

            <dt>醫師姓名</dt>
            <dd th:text="${appointment.doctor.name}">陳志明醫師</dd>

            <dt>科別</dt>
            <dd th:text="${appointment.doctor.department}">家醫科</dd>

            <dt>日期</dt>
            <dd th:text="${appointment.apptDate}">2026-05-01</dd>

            <dt>時段</dt>
            <dd th:text="${appointment.timeSlot}">AM</dd>

            <dt>狀態</dt>
            <dd th:text="${appointment.status}">BOOKED</dd>
        </dl>
    </div>

    <p class="notice">掛號已成功寫入資料庫！</p>

    <p><a th:href="@{/appointment/new}">重新掛號</a></p>
    <p><a th:href="@{/}">← 回首頁</a></p>
</body>
</html>
