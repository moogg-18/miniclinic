<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計資料 - MiniClinic</title>

    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #0F2443;
            border-bottom: 3px solid #14B8A6;
            padding-bottom: 8px;
        }

        .card {
            background: #F8FAFC;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #14B8A6;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #F8FAFC;
        }

        th {
            background: #0F2443;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #E2E8F0;
        }

        tr:hover td {
            background: #F0FDFA;
        }

        a {
            color: #14B8A6;
        }
    </style>
</head>

<body>

<h1>系統統計資料</h1>

<div class="card">
    <p>醫師總數：<strong th:text="${doctorCount}"></strong></p>
    <p>病患總數：<strong th:text="${patientCount}"></strong></p>
    <p>掛號總數：<strong th:text="${appointmentCount}"></strong></p>
</div>

<h2>各科掛號數</h2>

<table>
    <thead>
        <tr>
            <th>科別</th>
            <th>掛號數</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="entry : ${deptStats}">
            <td th:text="${entry.key}"></td>
            <td th:text="${entry.value}"></td>
        </tr>
    </tbody>
</table>

<p>
    <a th:href="@{/}">← 回首頁</a>
</p>

</body>
</html>
